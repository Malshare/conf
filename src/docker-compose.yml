services:
  frontend:
    image: ghcr.io/malshare/frontend
    expose:
      - "80"
    env_file:
      - frontend.env
    volumes:
      - daily_exports:/var/www/html/daily:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    depends_on:
      - frontend
    env_file:
      - frontend.env

  upload-handler:
    image: ghcr.io/malshare/upload-handler
    env_file:
      - frontend.env
    restart: unless-stopped

  url-task-handler:
    image: ghcr.io/malshare/url-task-handler
    env_file:
      - frontend.env
    restart: unless-stopped

  generate-daily:
    image: ghcr.io/malshare/generate-daily
    env_file:
      - frontend.env
    environment:
      - OUTPUT_DIR=/daily
    volumes:
      - daily_exports:/daily
    # Run once daily: execute script, sleep 24h, repeat
    entrypoint: ["/bin/sh", "-c", "while true; do python3 -u generate_daily.py; sleep 86400; done"]
    restart: unless-stopped

volumes:
  daily_exports:
